# KRONOS - Full Docker Stack
# Usage: docker compose up -d
# UI:    http://localhost
# API:   http://localhost/api
# Docs:  http://localhost/docs

x-common-env: &common-env
  DATABASE_URL:          postgresql+asyncpg://kronos:kronos@postgres:5432/kronos
  REDIS_URL:             redis://redis:6379
  OLLAMA_BASE_URL:       http://host.docker.internal:11434
  CHROMA_HOST:           chromadb
  CHROMA_PORT:           8000
  CHROMA_PERSIST_DIR:    /chroma_data
  DOCKER_SOCKET:         unix:///var/run/docker.sock
  KRONOS_WORKER_NETWORK: kronos_workers
  EMBED_MODEL:           nomic-embed-text

services:

  # 0. Nginx reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: kronos_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - kronos-api
      - kronos-ui
    networks:
      - kronos_net
    restart: unless-stopped

  # 1. KRONOS API
  kronos-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kronos_api
    environment:
      <<: *common-env
    env_file:
      - secrets.env
    volumes:
      - chroma_data:/chroma_data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${KRONOS_WATCH_FOLDER:-/tmp/kronos-watch}:/watch_folder
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - kronos_net
      - kronos_workers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # 2. KRONOS UI
  kronos-ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kronos_ui
    networks:
      - kronos_net
    restart: unless-stopped

  # 3. PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: kronos_postgres
    environment:
      POSTGRES_USER:     kronos
      POSTGRES_PASSWORD: kronos
      POSTGRES_DB:       kronos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kronos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 4. Redis
  redis:
    image: redis:7-alpine
    container_name: kronos_redis
    volumes:
      - redis_data:/data
    networks:
      - kronos_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 5. ChromaDB — no healthcheck (image varies, curl not guaranteed)
  # API connects with retry logic so it's fine if chroma takes a moment
  chromadb:
    image: chromadb/chroma:latest
    container_name: kronos_chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - kronos_net
    restart: unless-stopped

  # Optional: Unsloth fine-tuning container
  # Uncomment to pre-pull the image so fine-tune jobs start instantly.
  # Requires NVIDIA GPU for practical speed; CPU fallback is very slow.
  # 
  # To enable: uncomment the block and run:
  #   docker compose pull unsloth
  #   docker compose up -d
  #
  # unsloth:
  #   image: unsloth/unsloth-repo:latest
  #   container_name: kronos_unsloth
  #   command: sleep infinity          # keep alive for exec-based jobs
  #   volumes:
  #     - /app/finetune_outputs:/output
  #   networks:
  #     - kronos_net
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  postgres_data:
    name: kronos_postgres_data
  redis_data:
    name: kronos_redis_data
  chroma_data:
    name: kronos_chroma_data

networks:
  kronos_net:
    name: kronos_net
    driver: bridge
  kronos_workers:
    name: kronos_workers
    driver: bridge
